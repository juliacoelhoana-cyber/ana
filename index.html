
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Clique</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
    }

    #gameArea {
      width: 100%;
      height: 70vh;
      position: relative;
      overflow: hidden;
      background: #222;
      margin-top: 20px;
    }

    #target {
      width: 60px;
      height: 60px;
      background: red;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      display: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🎯 Jogo de Clique</h1>
<p>Pontuação: <span id="score">0</span></p>
<p>Tempo: <span id="time">10</span>s</p>

<button onclick="startGame()">Iniciar Jogo</button>

<div id="gameArea">
  <div id="target"></div>
</div>

<script>
let score = 0;
let time = 10;
let timer;
let gameRunning = false;

const target = document.getElementById("target");
const scoreDisplay = document.getElementById("score");
const timeDisplay = document.getElementById("time");
const gameArea = document.getElementById("gameArea");

function randomPosition() {
  const x = Math.random() * (gameArea.clientWidth - 60);
  const y = Math.random() * (gameArea.clientHeight - 60);
  target.style.left = x + "px";
  target.style.top = y + "px";
}

target.onclick = () => {
  if (!gameRunning) return;
  score++;
  scoreDisplay.textContent = score;
  randomPosition();
};

function startGame() {
  score = 0;
  time = 10;
  gameRunning = true;

  scoreDisplay.textContent = score;
  timeDisplay.textContent = time;

  target.style.display = "block";
  randomPosition();

  clearInterval(timer);
  timer = setInterval(() => {
    time--;
    timeDisplay.textContent = time;

    if (time <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameRunning = false;
  clearInterval(timer);
  target.style.display = "none";

  alert("Fim de jogo! Sua pontuação foi: " + score);
}
</script>

</body>
</html>
